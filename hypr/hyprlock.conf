# =============================================================================
# HYPRLOCK CONFIGURATION (FOR SWAY)
# =============================================================================

background {
    monitor =
    # Macht beim Sperren einen Screenshot und zeichnet ihn weich (Blur)
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# 1. ZEIT-ANZEIGE (Große digitale Uhr)
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Größe der Passwort-Punkte (0.2 - 0.8)
    dots_spacing = 0.2 # Abstand der Punkte
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Passwort eingeben...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# 2. DATUMS-ANZEIGE
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d. %B %Y')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 22
    font_family = JetBrains Mono Nerd Font, Sans-Serif
    position = 0, 300
    halign = center
    valign = center
}

# 3. TEXT-LABEL (Willkommen zurück / Benutzername)
label {
    monitor =
    text = cmd[update:1000] echo "Uhrzeit: $(date '+%H:%M:%S')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 64
    font_family = JetBrains Mono Nerd Font Bold, Sans-Serif
    position = 0, 200
    halign = center
    valign = center
}

# 4. SPERR-RECHTE STATUS (Caps Lock Warnung)
label {
    monitor =
    text = $USER @ $HOSTNAME
    color = rgba(255, 255, 255, 0.4)
    font_size = 14
    font_family = JetBrains Mono Nerd Font, Sans-Serif
    position = 0, 10
    halign = center
    valign = bottom
}
